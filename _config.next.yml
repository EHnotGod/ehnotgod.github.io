# Schemes
#scheme: Muse
#scheme: Mist
#scheme: Pisces
scheme: Gemini
# 菜单（显示哪些导航）
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-folder
  tags: /tags/ || fa fa-tags

# 侧边栏头像
avatar:
  url: /images/avatar.png   # 放一张图片到 source/images/
  rounded: true

# 社交链接
social:
  GitHub: https://github.com/ehnotgod || fab fa-github
  E-Mail: mailto:417674118@qq.com || fa fa-envelope

# Local Search
# Dependencies: https://github.com/theme-next/hexo-generator-searchdb
local_search:
  enable: true
  # If auto, trigger search by changing input.
  # If manual, trigger search by pressing enter key or search button.
  trigger: auto
  # Show top n results per article, show all results by setting to -1
  top_n_per_article: 1
  # Unescape html strings to the readable one.
  unescape: false
  # Preload the search data when the page loads.
  preload: false

# 统计字数和阅读时间
symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true
  exclude_codeblock: false
  awl: 2    
  wpm: 275
  suffix: "mins."

# 不蒜子统计
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

# Reward (Donate)
reward_settings:
  enable: true
  animation: true
reward:
  wechatpay: /images/wechatpay.png

# Blog rolls
links_settings:
  icon: fa fa-link
  title: Links
  # Available values: block | inline
  layout: inline

links:
  #Title: http://yoursite.com
  Codeforces: https://codeforces.com/profile/EHnotgod
  Luogu: https://www.luogu.com.cn/user/1347497

github_banner:
  enable: true
  permalink: https://github.com/ehnotgod
  title: Follow me on GitHub